name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy-generate-image:
    name: Deploy generate-image
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN repository secret" >&2
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing SUPABASE_PROJECT_REF repository secret" >&2
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply reliability database migration
        shell: bash
        run: |
          set -euo pipefail
          jq -Rs '{query: .}' \
            < supabase/migrations/20260720014500_refund_stale_image_jobs.sql \
            > /tmp/reliability-migration.json
          curl --fail-with-body --silent --show-error \
            --request POST \
            --url "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data-binary @/tmp/reliability-migration.json

      - name: Deploy api-v1 Edge Function
        run: supabase functions deploy api-v1 --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy generate-image Edge Function
        run: supabase functions deploy generate-image --project-ref "$SUPABASE_PROJECT_REF"
